<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление сайтом DK DIZEL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #333; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #f97316;
      border-bottom: 2px solid #f97316;
      padding-bottom: 8px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #333;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
    }
    textarea { min-height: 80px; resize: vertical; }
    input:focus, textarea:focus {
      outline: none;
      border-color: #f97316;
    }
    button {
      background: #f97316;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #ea580c; }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
    .note {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 20px;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      max-width: 400px;
      margin: 100px auto;
    }
    .login-box h1 { text-align: center; }
    .error { color: red; text-align: center; margin-top: 12px; display: none; }
    .tab {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab button {
      background: #e5e5e5;
      color: #333;
      width: auto;
      padding: 10px 20px;
    }
    .tab button.active {
      background: #f97316;
      color: white;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .case-item, .review-item {
      background: #f9f9f9;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .remove-btn {
      background: #ef4444;
      margin-top: 10px;
      padding: 8px;
    }
    .add-btn {
      background: #22c55e;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="loginBox" class="login-box">
    <h1>🔐 Вход в админку</h1>
    <input type="password" id="password" placeholder="Введите пароль" style="margin-top:20px">
    <button onclick="checkPassword()" style="margin-top:20px">Войти</button>
    <div id="error" class="error">Неверный пароль</div>
  </div>

  <div id="adminPanel" style="display:none">
    <div class="container">
      <h1>📝 Управление сайтом DK DIZEL</h1>
      
      <div class="tab">
        <button class="tab-btn active" data-tab="main">🏠 Главная</button>
        <button class="tab-btn" data-tab="services">🔧 Услуги</button>
        <button class="tab-btn" data-tab="cases">🚗 Кейсы</button>
        <button class="tab-btn" data-tab="reviews">⭐ Отзывы</button>
        <button class="tab-btn" data-tab="contacts">📞 Контакты</button>
      </div>

      <!-- Вкладка Главная -->
      <div id="tab-main" class="tab-content active">
        <div class="card">
          <h2>🏠 Главный экран</h2>
          <div class="field">
            <label>Заголовок (H1)</label>
            <input type="text" id="hero_title" placeholder="Профессиональное восстановление дизельных систем до 99%">
          </div>
          <div class="field">
            <label>Подзаголовок</label>
            <input type="text" id="hero_subtitle" placeholder="Ремонт форсунок и чистка DPF в Минске (Брикета 17Б)">
          </div>
          <div class="field">
            <label>Гарантия</label>
            <input type="text" id="hero_guarantee" placeholder="Гарантия 12 месяцев">
          </div>
        </div>

        <div class="card">
          <h2>📊 Статистика</h2>
          <div class="field"><label>Лет опыта</label><input type="text" id="stat_experience" placeholder="8+"></div>
          <div class="field"><label>Клиентов</label><input type="text" id="stat_clients" placeholder="3000+"></div>
          <div class="field"><label>Результат</label><input type="text" id="stat_result" placeholder="99%"></div>
        </div>
      </div>

      <!-- Вкладка Услуги -->
      <div id="tab-services" class="tab-content">
        <div class="card">
          <h2>�� Цены на услуги</h2>
          <div class="field"><label>Ремонт форсунок</label><input type="text" id="price_injectors" placeholder="от 120 BYN"></div>
          <div class="field"><label>Чистка DPF</label><input type="text" id="price_dpf" placeholder="от 250 BYN"></div>
          <div class="field"><label>Диагностика турбин</label><input type="text" id="price_turbo" placeholder="от 80 BYN"></div>
          <div class="field"><label>Промывка инжекторов</label><input type="text" id="price_injector_cleaning" placeholder="от 60 BYN"></div>
        </div>
      </div>

      <!-- Вкладка Кейсы -->
      <div id="tab-cases" class="tab-content">
        <div class="card">
          <h2>🚗 Примеры работ</h2>
          <div id="cases-container"></div>
          <button class="add-btn" onclick="addCase()">+ Добавить кейс</button>
        </div>
      </div>

      <!-- Вкладка Отзывы -->
      <div id="tab-reviews" class="tab-content">
        <div class="card">
          <h2>⭐ Отзывы клиентов</h2>
          <div id="reviews-container"></div>
          <button class="add-btn" onclick="addReview()">+ Добавить отзыв</button>
        </div>
      </div>

      <!-- Вкладка Контакты -->
      <div id="tab-contacts" class="tab-content">
        <div class="card">
          <h2>📞 Контактная информация</h2>
          <div class="field"><label>Телефон</label><input type="text" id="phone" placeholder="+375 29 144-00-40"></div>
          <div class="field"><label>Email</label><input type="email" id="email" placeholder="info@dkdiesel.by"></div>
          <div class="field"><label>Адрес</label><input type="text" id="address" placeholder="Минск, ул. Брикета, 17Б"></div>
        </div>
      </div>

      <button id="saveBtn">💾 Сохранить все изменения</button>
      <div id="status" class="status"></div>
      <div class="note">После сохранения сайт обновится в течение 1-2 минут</div>
    </div>
  </div>

  <script>
    const PASSWORD = 'DKDiesel2024';
    const REPO = 'i3774444-cmd/DK_DIZEL';
    const FILE_PATH = 'src/data/content.json';
    const BRANCH = 'main';
    let fileSha = null;
    let casesData = [];
    let reviewsData = [];

    function checkPassword() {
      const password = document.getElementById('password').value;
      if (password === PASSWORD) {
        sessionStorage.setItem('admin_logged_in', 'true');
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadData();
      } else {
        document.getElementById('error').style.display = 'block';
        setTimeout(() => {
          document.getElementById('error').style.display = 'none';
        }, 2000);
      }
    }

    function renderCases() {
      const container = document.getElementById('cases-container');
      container.innerHTML = '';
      casesData.forEach((c, i) => {
        container.innerHTML += `
          <div class="case-item">
            <div class="field"><label>Название</label><input type="text" class="case-title" data-idx="${i}" value="${escapeHtml(c.title)}"></div>
            <div class="field"><label>Автомобиль</label><input type="text" class="case-vehicle" data-idx="${i}" value="${escapeHtml(c.vehicle)}"></div>
            <div class="field"><label>Проблема</label><textarea class="case-problem" data-idx="${i}">${escapeHtml(c.problem)}</textarea></div>
            <div class="field"><label>Решение</label><textarea class="case-solution" data-idx="${i}">${escapeHtml(c.solution)}</textarea></div>
            <div class="field"><label>Результат</label><textarea class="case-result" data-idx="${i}">${escapeHtml(c.result)}</textarea></div>
            <div class="field"><label>Цена</label><input type="text" class="case-price" data-idx="${i}" value="${escapeHtml(c.price)}"></div>
            <div class="field"><label>Срок</label><input type="text" class="case-duration" data-idx="${i}" value="${escapeHtml(c.duration)}"></div>
            <button class="remove-btn" onclick="removeCase(${i})">Удалить</button>
          </div>
        `;
      });
      // Привязываем события
      document.querySelectorAll('.case-title').forEach(el => el.addEventListener('change', (e) => casesData[e.target.dataset.idx].title = e.target.value));
      document.querySelectorAll('.case-vehicle').forEach(el => el.addEventListener('change', (e) => casesData[e.target.dataset.idx].vehicle = e.target.value));
      document.querySelectorAll('.case-problem').forEach(el => el.addEventListener('change', (e) => casesData[e.target.dataset.idx].problem = e.target.value));
      document.querySelectorAll('.case-solution').forEach(el => el.addEventListener('change', (e) => casesData[e.target.dataset.idx].solution = e.target.value));
      document.querySelectorAll('.case-result').forEach(el => el.addEventListener('change', (e) => casesData[e.target.dataset.idx].result = e.target.value));
      document.querySelectorAll('.case-price').forEach(el => el.addEventListener('change', (e) => casesData[e.target.dataset.idx].price = e.target.value));
      document.querySelectorAll('.case-duration').forEach(el => el.addEventListener('change', (e) => casesData[e.target.dataset.idx].duration = e.target.value));
    }

    function renderReviews() {
      const container = document.getElementById('reviews-container');
      container.innerHTML = '';
      reviewsData.forEach((r, i) => {
        container.innerHTML += `
          <div class="review-item">
            <div class="field"><label>Имя</label><input type="text" class="review-name" data-idx="${i}" value="${escapeHtml(r.name)}"></div>
            <div class="field"><label>Отзыв</label><textarea class="review-text" data-idx="${i}">${escapeHtml(r.text)}</textarea></div>
            <button class="remove-btn" onclick="removeReview(${i})">Удалить</button>
          </div>
        `;
      });
      document.querySelectorAll('.review-name').forEach(el => el.addEventListener('change', (e) => reviewsData[e.target.dataset.idx].name = e.target.value));
      document.querySelectorAll('.review-text').forEach(el => el.addEventListener('change', (e) => reviewsData[e.target.dataset.idx].text = e.target.value));
    }

    function addCase() {
      casesData.push({ title: "Новый кейс", vehicle: "Марка модель", problem: "Описание проблемы", solution: "Что сделали", result: "Результат", price: "от 0 BYN", duration: "1 день" });
      renderCases();
    }

    function removeCase(idx) {
      casesData.splice(idx, 1);
      renderCases();
    }

    function addReview() {
      reviewsData.push({ name: "Имя клиента", text: "Текст отзыва..." });
      renderReviews();
    }

    function removeReview(idx) {
      reviewsData.splice(idx, 1);
      renderReviews();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    async function loadData() {
      try {
        const url = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}?ref=${BRANCH}`;
        const response = await fetch(url);
        const data = await response.json();
        const content = JSON.parse(atob(data.content));
        
        // Главная
        document.getElementById('hero_title').value = content.hero?.title || "Профессиональное восстановление дизельных систем до 99%";
        document.getElementById('hero_subtitle').value = content.hero?.subtitle || "Ремонт форсунок и чистка DPF в Минске (Брикета 17Б)";
        document.getElementById('hero_guarantee').value = content.hero?.guarantee || "Гарантия 12 месяцев";
        
        // Статистика
        document.getElementById('stat_experience').value = content.stats[0]?.value || "8+";
        document.getElementById('stat_clients').value = content.stats[1]?.value || "3000+";
        document.getElementById('stat_result').value = content.stats[2]?.value || "99%";
        
        // Услуги
        document.getElementById('price_injectors').value = content.services[0]?.price || "от 120 BYN";
        document.getElementById('price_dpf').value = content.services[1]?.price || "от 250 BYN";
        document.getElementById('price_turbo').value = content.services[2]?.price || "от 80 BYN";
        document.getElementById('price_injector_cleaning').value = content.services[3]?.price || "от 60 BYN";
        
        // Кейсы
        casesData = content.cases || [
          { title: "Ремонт форсунок", vehicle: "VW Passat B7", problem: "Троит двигатель", solution: "Замена форсунок", result: "Двигатель работает ровно", price: "от 120 BYN", duration: "1 день" }
        ];
        renderCases();
        
        // Отзывы
        reviewsData = content.reviews || [
          { name: "Алексей", text: "Отличный сервис! Всё сделали быстро и качественно." },
          { name: "Дмитрий", text: "Рекомендую! Профессиональный подход." }
        ];
        renderReviews();
        
        // Контакты
        document.getElementById('phone').value = content.contacts?.phone || "+375 29 144-00-40";
        document.getElementById('email').value = content.contacts?.email || "info@dkdiesel.by";
        document.getElementById('address').value = content.contacts?.address || "Минск, ул. Брикета, 17Б";
        
        fileSha = data.sha;
      } catch (error) {
        showStatus('Ошибка загрузки: ' + error.message, 'error');
      }
    }

    function showStatus(message, type) {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
      setTimeout(() => {
        statusDiv.className = 'status';
      }, 5000);
    }

    async function saveData() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.classList.add('loading');
      saveBtn.textContent = '⏳ Сохранение...';
      
      try {
        const newContent = {
          hero: {
            title: document.getElementById('hero_title').value,
            subtitle: document.getElementById('hero_subtitle').value,
            guarantee: document.getElementById('hero_guarantee').value,
            badges: ["Оригинальное оборудование", "Гарантия 12 мес.", "Диагностика за 30 мин"]
          },
          services: [
            { title: "Ремонт форсунок", subtitle: "Common Rail", desc: "Восстановление и калибровка дизельных форсунок на стенде Bosch EPS-815", price: document.getElementById('price_injectors').value, slug: "injectors" },
            { title: "Чистка DPF", subtitle: "Сажевые фильтры", desc: "Термическая и химическая очистка DPF/FAP фильтров до заводских параметров", price: document.getElementById('price_dpf').value, slug: "dpf" },
            { title: "Диагностика турбин", subtitle: "Актуаторы & Геометрия", desc: "Компьютерная диагностика и ремонт турбокомпрессоров", price: document.getElementById('price_turbo').value, slug: "turbo" },
            { title: "Промывка инжекторов", subtitle: "Ультразвуковая", desc: "Глубокая промывка инжекторной системы с проверкой распыла", price: document.getElementById('price_injector_cleaning').value, slug: "injector-cleaning" }
          ],
          stats: [
            { value: document.getElementById('stat_experience').value, label: "лет опыта" },
            { value: document.getElementById('stat_clients').value, label: "клиентов" },
            { value: document.getElementById('stat_result').value, label: "результат" }
          ],
          cases: casesData,
          reviews: reviewsData,
          contacts: {
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            address: document.getElementById('address').value
          }
        };
        
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(newContent, null, 2))));
        
        const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: 'Update content via admin panel',
            content: content,
            sha: fileSha,
            branch: BRANCH
          })
        });
        
        if (response.ok) {
          showStatus('✅ Успешно сохранено! Сайт обновится через 1-2 минуты', 'success');
          const data = await response.json();
          fileSha = data.content.sha;
        } else {
          const error = await response.json();
          throw new Error(error.message);
        }
      } catch (error) {
        showStatus('❌ Ошибка: ' + error.message, 'error');
      } finally {
        saveBtn.classList.remove('loading');
        saveBtn.textContent = '💾 Сохранить все изменения';
      }
    }

    // Табы
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    if (sessionStorage.getItem('admin_logged_in') === 'true') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadData();
    }

    document.getElementById('saveBtn').addEventListener('click', saveData);
  </script>
</body>
</html>
