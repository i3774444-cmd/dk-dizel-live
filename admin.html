<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление сайтом DK DIZEL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #333; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #f97316; border-bottom: 2px solid #f97316; padding-bottom: 8px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #333; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: monospace; }
    textarea { min-height: 80px; resize: vertical; }
    .feature-item, .process-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .feature-item input, .process-item input { flex: 1; }
    .remove-feature, .remove-process { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    .add-btn { background: #22c55e; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 8px; }
    button { background: #f97316; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
    button:hover { background: #ea580c; }
    .status { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
    .status.success { background: #dcfce7; color: #166534; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    .loading { opacity: 0.6; pointer-events: none; }
    .note { font-size: 12px; color: #666; text-align: center; margin-top: 20px; }
    .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-width: 400px; margin: 100px auto; }
    .login-box h1 { text-align: center; }
    .error { color: red; text-align: center; margin-top: 12px; display: none; }
    .tab { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab button { background: #e5e5e5; color: #333; width: auto; padding: 10px 20px; }
    .tab button.active { background: #f97316; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .service-card { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .service-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #f97316; }
  </style>
</head>
<body>
  <div id="loginBox" class="login-box">
    <h1>🔐 Вход в админку</h1>
    <input type="password" id="password" placeholder="Введите пароль" style="margin-top:20px">
    <button onclick="checkPassword()" style="margin-top:20px">Войти</button>
    <div id="error" class="error">Неверный пароль</div>
  </div>

  <div id="adminPanel" style="display:none">
    <div class="container">
      <h1>📝 Управление услугами DK DIZEL</h1>

      <div class="tab">
        <button class="tab-btn active" data-tab="services">🔧 Услуги</button>
        <button class="tab-btn" data-tab="contacts">📞 Контакты</button>
        <button class="tab-btn" data-tab="about">📄 О компании</button>
      </div>

      <!-- Вкладка Услуги -->
      <div id="tab-services" class="tab-content active">
        <div id="services-container"></div>
      </div>

      <!-- Вкладка Контакты -->
      <div id="tab-contacts" class="tab-content">
        <div class="card">
          <h2>📞 Контактная информация</h2>
          <div class="field"><label>Телефон</label><input type="text" id="phone"></div>
          <div class="field"><label>Email</label><input type="email" id="email"></div>
          <div class="field"><label>Адрес</label><input type="text" id="address"></div>
          <div class="field"><label>График работы</label><input type="text" id="work_hours"></div>
          <div class="field"><label>Примечание к графику</label><input type="text" id="work_hours_note"></div>
          <h3>Реквизиты</h3>
          <div class="field"><label>Компания</label><input type="text" id="requisites_company"></div>
          <div class="field"><label>УНП</label><input type="text" id="requisites_unp"></div>
          <div class="field"><label>Расчётный счёт</label><input type="text" id="requisites_account"></div>
        </div>
      </div>

      <!-- Вкладка О компании -->
      <div id="tab-about" class="tab-content">
        <div class="card">
          <h2>�� О компании</h2>
          <div class="field"><label>Текст о компании</label><textarea id="about_text" rows="6"></textarea></div>
          <div class="field"><label>Оборудование</label><input type="text" id="about_equipment"></div>
        </div>
      </div>

      <button id="saveBtn">💾 Сохранить все изменения</button>
      <div id="status" class="status"></div>
      <div class="note">После сохранения сайт обновится в течение 1-2 минут</div>
    </div>
  </div>

  <script>
    const PASSWORD = 'DKDiesel2024';
    const REPO = 'i3774444-cmd/DK_DIZEL_NEW';
    const BRANCH = 'main';
    const GITHUB_TOKEN = '';
    
    const FILES = {
      services: 'src/data/services.json',
      contacts: 'src/data/contacts.json',
      about: 'src/data/about.json'
    };
    
    let fileShas = {};
    let servicesData = [];

    function checkPassword() {
      const password = document.getElementById('password').value;
      if (password === PASSWORD) {
        sessionStorage.setItem('admin_logged_in', 'true');
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAllData();
      } else {
        document.getElementById('error').style.display = 'block';
        setTimeout(() => {
          document.getElementById('error').style.display = 'none';
        }, 2000);
      }
    }

    async function fetchFile(filePath) {
      try {
        const url = `https://api.github.com/repos/${REPO}/contents/${filePath}?ref=${BRANCH}`;
        const headers = {};
        if (GITHUB_TOKEN && GITHUB_TOKEN !== '') {
          headers['Authorization'] = `token ${GITHUB_TOKEN}`;
        }
        const response = await fetch(url, { headers });
        if (response.status === 404) return null;
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const content = JSON.parse(atob(data.content));
        fileShas[filePath] = data.sha;
        return content;
      } catch (error) {
        console.error(`Error loading ${filePath}:`, error);
        return null;
      }
    }

    async function saveFile(filePath, content) {
      const data = {
        message: `Update ${filePath} via admin panel`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
        sha: fileShas[filePath],
        branch: BRANCH
      };
      
      const headers = {
        'Content-Type': 'application/json'
      };
      if (GITHUB_TOKEN && GITHUB_TOKEN !== '') {
        headers['Authorization'] = `token ${GITHUB_TOKEN}`;
      }
      
      const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${filePath}`, {
        method: 'PUT',
        headers: headers,
        body: JSON.stringify(data)
      });
      
      if (!response.ok) throw new Error(await response.text());
      const result = await response.json();
      fileShas[filePath] = result.content.sha;
      return result;
    }

    function renderServices() {
      const container = document.getElementById('services-container');
      container.innerHTML = '';
      servicesData.forEach((service, idx) => {
        container.innerHTML += `
          <div class="service-card" data-idx="${idx}">
            <div class="service-title">${service.title}</div>
            <div class="field"><label>Название</label><input type="text" class="service-title-input" data-idx="${idx}" value="${escapeHtml(service.title)}"></div>
            <div class="field"><label>Подзаголовок</label><input type="text" class="service-subtitle" data-idx="${idx}" value="${escapeHtml(service.subtitle)}"></div>
            <div class="field"><label>Краткое описание (карточка)</label><textarea class="service-desc" data-idx="${idx}">${escapeHtml(service.desc)}</textarea></div>
            <div class="field"><label>Цена</label><input type="text" class="service-price" data-idx="${idx}" value="${escapeHtml(service.price)}"></div>
            <div class="field"><label>Полное описание (детальная страница)</label><textarea class="service-heroDesc" data-idx="${idx}">${escapeHtml(service.heroDescription || service.desc)}</textarea></div>
            
            <h3>Что включено (features)</h3>
            <div class="features-container" data-idx="${idx}"></div>
            <button class="add-feature" data-idx="${idx}">+ Добавить пункт</button>
            
            <h3>Этапы работ (process)</h3>
            <div class="process-container" data-idx="${idx}"></div>
            <button class="add-process" data-idx="${idx}">+ Добавить этап</button>
          </div>
        `;
      });
      
      // Заполняем features и process для каждой услуги
      servicesData.forEach((service, idx) => {
        const featuresContainer = document.querySelector(`.features-container[data-idx="${idx}"]`);
        const processContainer = document.querySelector(`.process-container[data-idx="${idx}"]`);
        
        if (service.features) {
          service.features.forEach((feature, fIdx) => {
            featuresContainer.innerHTML += `
              <div class="feature-item">
                <input type="text" class="feature-input" data-service-idx="${idx}" data-feature-idx="${fIdx}" value="${escapeHtml(feature)}">
                <button class="remove-feature" data-service-idx="${idx}" data-feature-idx="${fIdx}">✖</button>
              </div>
            `;
          });
        }
        
        if (service.process) {
          service.process.forEach((step, pIdx) => {
            processContainer.innerHTML += `
              <div class="process-item">
                <input type="text" class="process-input" data-service-idx="${idx}" data-process-idx="${pIdx}" value="${escapeHtml(step.step)}">
                <button class="remove-process" data-service-idx="${idx}" data-process-idx="${pIdx}">✖</button>
              </div>
            `;
          });
        }
      });
      
      attachServiceEvents();
    }

    function attachServiceEvents() {
      // Изменение полей услуги
      document.querySelectorAll('.service-title-input').forEach(el => {
        el.addEventListener('change', (e) => servicesData[e.target.dataset.idx].title = e.target.value);
      });
      document.querySelectorAll('.service-subtitle').forEach(el => {
        el.addEventListener('change', (e) => servicesData[e.target.dataset.idx].subtitle = e.target.value);
      });
      document.querySelectorAll('.service-desc').forEach(el => {
        el.addEventListener('change', (e) => servicesData[e.target.dataset.idx].desc = e.target.value);
      });
      document.querySelectorAll('.service-price').forEach(el => {
        el.addEventListener('change', (e) => servicesData[e.target.dataset.idx].price = e.target.value);
      });
      document.querySelectorAll('.service-heroDesc').forEach(el => {
        el.addEventListener('change', (e) => servicesData[e.target.dataset.idx].heroDescription = e.target.value);
      });
      
      // Добавление feature
      document.querySelectorAll('.add-feature').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          if (!servicesData[idx].features) servicesData[idx].features = [];
          servicesData[idx].features.push('Новый пункт');
          renderServices();
        });
      });
      
      // Добавление process
      document.querySelectorAll('.add-process').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          if (!servicesData[idx].process) servicesData[idx].process = [];
          servicesData[idx].process.push({ step: 'Новый этап' });
          renderServices();
        });
      });
      
      // Удаление feature
      document.querySelectorAll('.remove-feature').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const serviceIdx = parseInt(e.target.dataset.serviceIdx);
          const featureIdx = parseInt(e.target.dataset.featureIdx);
          servicesData[serviceIdx].features.splice(featureIdx, 1);
          renderServices();
        });
      });
      
      // Удаление process
      document.querySelectorAll('.remove-process').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const serviceIdx = parseInt(e.target.dataset.serviceIdx);
          const processIdx = parseInt(e.target.dataset.processIdx);
          servicesData[serviceIdx].process.splice(processIdx, 1);
          renderServices();
        });
      });
      
      // Изменение feature
      document.querySelectorAll('.feature-input').forEach(el => {
        el.addEventListener('change', (e) => {
          const serviceIdx = parseInt(e.target.dataset.serviceIdx);
          const featureIdx = parseInt(e.target.dataset.featureIdx);
          servicesData[serviceIdx].features[featureIdx] = e.target.value;
        });
      });
      
      // Изменение process
      document.querySelectorAll('.process-input').forEach(el => {
        el.addEventListener('change', (e) => {
          const serviceIdx = parseInt(e.target.dataset.serviceIdx);
          const processIdx = parseInt(e.target.dataset.processIdx);
          servicesData[serviceIdx].process[processIdx].step = e.target.value;
        });
      });
    }

    async function loadAllData() {
      try {
        const services = await fetchFile(FILES.services);
        if (services) {
          servicesData = services;
          renderServices();
        }
        
        const contacts = await fetchFile(FILES.contacts);
        if (contacts) {
          document.getElementById('phone').value = contacts.phone || '';
          document.getElementById('email').value = contacts.email || '';
          document.getElementById('address').value = contacts.address || '';
          document.getElementById('work_hours').value = contacts.work_hours || '';
          document.getElementById('work_hours_note').value = contacts.work_hours_note || '';
          if (contacts.requisites) {
            document.getElementById('requisites_company').value = contacts.requisites.company || '';
            document.getElementById('requisites_unp').value = contacts.requisites.unp || '';
            document.getElementById('requisites_account').value = contacts.requisites.account || '';
          }
        }
        
        const about = await fetchFile(FILES.about);
        if (about) {
          document.getElementById('about_text').value = about.text || '';
          document.getElementById('about_equipment').value = about.equipment || '';
        }
        
        showStatus('✅ Данные загружены', 'success');
      } catch (error) {
        showStatus('❌ Ошибка загрузки: ' + error.message, 'error');
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function showStatus(message, type) {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
      setTimeout(() => {
        statusDiv.className = 'status';
      }, 5000);
    }

    async function saveAllData() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.classList.add('loading');
      saveBtn.textContent = '⏳ Сохранение...';
      
      try {
        await saveFile(FILES.services, servicesData);
        
        await saveFile(FILES.contacts, {
          phone: document.getElementById('phone').value,
          email: document.getElementById('email').value,
          address: document.getElementById('address').value,
          work_hours: document.getElementById('work_hours').value,
          work_hours_note: document.getElementById('work_hours_note').value,
          requisites: {
            company: document.getElementById('requisites_company').value,
            unp: document.getElementById('requisites_unp').value,
            account: document.getElementById('requisites_account').value
          }
        });
        
        await saveFile(FILES.about, {
          text: document.getElementById('about_text').value,
          equipment: document.getElementById('about_equipment').value
        });
        
        showStatus('✅ Все изменения сохранены! Сайт обновится через 1-2 минуты', 'success');
      } catch (error) {
        showStatus('❌ Ошибка: ' + error.message, 'error');
      } finally {
        saveBtn.classList.remove('loading');
        saveBtn.textContent = '💾 Сохранить все изменения';
      }
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    if (sessionStorage.getItem('admin_logged_in') === 'true') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadAllData();
    }

    document.getElementById('saveBtn').addEventListener('click', saveAllData);
  </script>
</body>
</html>
